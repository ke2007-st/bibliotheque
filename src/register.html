<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — BiblioDash</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card auth-card-wide">
            <div class="auth-header">
                <span class="logo-icon">📚</span>
                <h1>Biblio<span>Dash</span></h1>
                <p>Creez votre compte membre de la bibliotheque</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-grid">
                    <label>
                        Nom *
                        <input type="text" id="nom" required placeholder="Dupont">
                    </label>
                    <label>
                        Prenom *
                        <input type="text" id="prenom" required placeholder="Marie">
                    </label>
                </div>
                <label>
                    Email *
                    <input type="email" id="email" required placeholder="marie.dupont@email.com">
                </label>
                <label>
                    Telephone
                    <input type="tel" id="telephone" placeholder="06 12 34 56 78">
                </label>
                <div class="form-grid">
                    <label>
                        Mot de passe *
                        <input type="password" id="mot_de_passe" required minlength="8" placeholder="Min. 8 caracteres">
                    </label>
                    <label>
                        Confirmer *
                        <input type="password" id="confirmer_mot_de_passe" required minlength="8" placeholder="Retapez le mot de passe">
                    </label>
                </div>
                <p class="profile-hint" style="margin-bottom:1rem;">8 caracteres min., 1 majuscule, 1 minuscule, 1 chiffre.</p>
                <button type="submit" class="btn btn-primary btn-full">S'inscrire</button>
            </form>

            <p class="auth-switch">
                Deja inscrit ?
                <a href="login.html">Se connecter</a>
            </p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/env.js"></script>
    <script src="js/config.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/register.js?v=2"></script>
</body>
</html>
