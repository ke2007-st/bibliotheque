<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — BiblioDash</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-icon">📚</span>
                <h1>Biblio<span>Dash</span></h1>
                <p>Connectez-vous a votre espace bibliotheque</p>
            </div>

            <form id="login-form" class="auth-form">
                <label>
                    Email
                    <input type="email" id="email" required placeholder="votre@email.com">
                </label>
                <label>
                    Mot de passe
                    <input type="password" id="mot_de_passe" required placeholder="Votre mot de passe">
                </label>
                <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            </form>

            <p class="auth-switch">
                Pas encore de compte ?
                <a href="register.html">Creer un compte</a>
            </p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/config.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/login.js?v=2"></script>
</body>
</html>
