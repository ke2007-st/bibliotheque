# Railway — hebergement backend (URL permanente *.up.railway.app)
# https://railway.app → New Project → Deploy from GitHub → Dockerfile path: deploy/backend/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/backend/Dockerfile"

[deploy]
healthcheckPath = "/api/health.php"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
